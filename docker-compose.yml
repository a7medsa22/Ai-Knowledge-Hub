version: '3.9'

services:
  api:
    build: .
    container_name: ai-knowledge-api
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres123@postgres:5432/ai_knowledge_hub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: StrongPassword123
    ports:
      - '3000:3000'

  postgres:
    image: pgvector/pgvector:pg15
    container_name: ai-knowledge-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ai_knowledge_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-knowledge-redis
    restart: always
    command: redis-server --appendonly yes --requirepass StrongPassword123

volumes:
  postgres_data: