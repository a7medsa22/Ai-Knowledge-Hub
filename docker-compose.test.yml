version: '3.9'

services:
  test-postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-research-test-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: ai_knowledge_hub_test
    ports:
      - '5555:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_knowledge_hub_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata_test:/var/lib/postgresql/data

  test-redis:
    image: redis:7-alpine
    container_name: ai-research-test-redis
    restart: always
    command: redis-server --requirepass testpass123
    ports:
      - '6389:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpass123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_test:
    driver: local
